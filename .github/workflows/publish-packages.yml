name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which package(s) to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - widget
          - host

jobs:
  publish-widget:
    name: Publish npm package (bsquare-widget)
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'widget'
    runs-on: ubuntu-latest
    environment: publishing
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci
        working-directory: packages/widget

      - name: Run tests
        run: npm test
        working-directory: packages/widget

      - name: Build
        run: npm run build
        working-directory: packages/widget

      - name: Publish to npm
        run: npm publish --access public --provenance
        working-directory: packages/widget
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-host:
    name: Publish PyPI package (bsquare-host)
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'host'
    runs-on: ubuntu-latest
    environment: publishing
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' build twine
        working-directory: packages/host

      - name: Run tests
        run: pytest
        working-directory: packages/host

      - name: Build sdist and wheel
        run: python -m build
        working-directory: packages/host

      - name: Check artifacts
        run: twine check dist/*
        working-directory: packages/host

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/host/dist/
